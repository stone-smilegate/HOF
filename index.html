<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Hall of Fame - Immersive Web Exhibition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      background-color: #050505;
      font-family: 'Futura PT', 'Futura', 'Inter', sans-serif;
      color: #fff;
    }

    #webgl-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px;
    }

    .header h1 {
      font-weight: 300;
      letter-spacing: 2px;
      font-size: 24px;
      opacity: 0.8;
      text-transform: uppercase;
    }
    
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0.6;
      font-size: 14px;
      letter-spacing: 1px;
    }

    #intro-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #050505;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1s ease;
      padding: 20px;
      text-align: center;
    }

    .intro-title {
      font-weight: 300;
      letter-spacing: 6px;
      font-size: 36px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .intro-text {
      max-width: 600px;
      font-size: 14px;
      line-height: 1.8;
      color: #aaa;
      margin-bottom: 40px;
      font-weight: 300;
    }

    #enter-button {
      padding: 12px 32px;
      border: 1px solid #333;
      background: transparent;
      color: #fff;
      font-family: 'Futura PT', 'Futura', 'Inter', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #enter-button:hover {
      background: #fff;
      color: #000;
      border-color: #fff;
    }
  </style>
</head>
<body>
  <div id="intro-screen">
    <h1 class="intro-title">The Hall of Fame</h1>
    <p class="intro-text">
      이곳은 뛰어난 업적과 발자취를 기리기 위한 몰입형 아카이브 공간입니다.<br/><br/>
      수많은 거장들의 기록이 우주의 한 공간처럼 끝없이 펼쳐지는 이 거대한 원통형 전시관에서, 각각의 액자가 담고 있는 역사적인 순간들을 조망하고 체험해 보세요.
    </p>
    <button id="enter-button">ENTER EXHIBITION</button>
  </div>
  <div id="ui-layer">
    <div class="header">
      <h1>The Hall of Fame</h1>
    </div>
    <div class="footer">
      <div>800 PIECES | 1:6 RATIO</div>
      <div>SCROLL TO NAVIGATE</div>
    </div>
  </div>
  <div id="webgl-container"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
